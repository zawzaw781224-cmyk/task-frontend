<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <!-- 📱 mobile responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            color: white;
        }

        .card {
            background: #111827;
            padding: 25px;
            width: 100%;
            max-width: 360px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #38bdf8;
            font-size: 22px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: none;
            border-radius: 8px;
            outline: none;
            background: #1f2937;
            color: white;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .login-btn {
            background: #3b82f6;
            color: white;
            margin-top: 10px;
        }

        .register-btn {
            background: transparent;
            border: 1px solid #38bdf8;
            color: #38bdf8;
            margin-top: 10px;
        }

        p {
            text-align: center;
            font-size: 13px;
            color: #94a3b8;
        }

        #msg {
            text-align: center;
            color: #f87171;
            font-size: 13px;
        }

        button:hover {
            opacity: 0.9;
        }

        /* 📱 mobile tweaks */
        @media (max-width: 480px) {
            .card {
                padding: 20px;
            }

            h2 {
                font-size: 20px;
            }
                }
                
        #toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }

        .toast {
            min-width: 200px;
            margin-bottom: 10px;
            padding: 12px 16px;
            border-radius: 6px;
            color: white;
            font-size: 14px;
            animation: slideIn 0.3s ease;
        }

        /* success */
        .toast.success {
            background: #4CAF50;
        }

        /* error */
        .toast.error {
            background: #f44336;
        }

        /* animation */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
    </style>
</head>

<body>

<div class="card">

    <h2>🔐 Login</h2>
    <p id="errorMsg" style="color:red "></p>
    <input id="username" placeholder="username">
    <input id="password" type="password" placeholder="password">

    <button type="button" class="login-btn" onclick="login()">Login</button>

    <p id="msg"></p>

    <p>Don't have an account?</p>

    <button type="button" class="register-btn" onclick="goRegister()">Go to Register</button>

</div>

<script src="login.js"></script>
<div id="toast-container"></div>
</body>
</html>
